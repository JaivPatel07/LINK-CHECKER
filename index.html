<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkScan — Link Health Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c26;
            --border: #2a2a38;
            --accent: #7c6af7;
            --accent2: #4fffb0;
            --danger: #ff4f6b;
            --warn: #ffb84f;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px 80px;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.6s ease both;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .logo-dot {
            width: 8px; height: 8px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        h1 {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            margin-top: 12px;
            font-size: 15px;
            color: var(--muted);
            font-weight: 400;
        }

        /* ── Search Box ── */
        .search-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px;
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
            animation: fadeUp 0.6s 0.1s ease both;
            transition: border-color 0.2s;
        }

        .search-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
        }

        #urlInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
        }

        #urlInput::placeholder { color: var(--muted); }

        #scanBtn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            white-space: nowrap;
        }

        #scanBtn:hover { background: #9080ff; }
        #scanBtn:active { transform: scale(0.97); }
        #scanBtn:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }

        /* ── Loader ── */
        #loader {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .scan-anim {
            width: 56px; height: 56px;
            margin: 0 auto 20px;
            position: relative;
        }

        .scan-ring {
            width: 100%; height: 100%;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .scan-dot {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse 1.2s ease infinite;
        }

        #loader p {
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        /* ── Stats ── */
        #stats {
            display: none;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeUp 0.4s ease both;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card.green::before { background: radial-gradient(circle at top, rgba(79,255,176,0.06), transparent 70%); }
        .stat-card.red::before   { background: radial-gradient(circle at top, rgba(255,79,107,0.06), transparent 70%); }
        .stat-card.purple::before{ background: radial-gradient(circle at top, rgba(124,106,247,0.08), transparent 70%); }
        .stat-card:hover::before { opacity: 1; }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
            display: block;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .stat-val.green { color: var(--accent2); }
        .stat-val.red   { color: var(--danger); }
        .stat-val.purple{ color: var(--accent); }
        .stat-val.white { color: var(--text); }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* ── Health Bar ── */
        .health-bar-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            display: none;
            animation: fadeUp 0.4s 0.1s ease both;
        }

        .health-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        .health-pct { font-size: 14px; color: var(--text); }

        .health-track {
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* ── Tabs ── */
        .tabs {
            display: none;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            animation: fadeUp 0.4s 0.15s ease both;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 16px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-radius: 7px;
            transition: background 0.15s, color 0.15s;
            letter-spacing: 0.04em;
        }

        .tab-btn.active {
            background: var(--surface2);
            color: var(--text);
        }

        /* ── Filter Bar ── */
        .filter-bar {
            display: none;
            gap: 8px;
            margin-bottom: 12px;
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 99px;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.05em;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ── Results List ── */
        #resultsList {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: none;
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .result-item {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s;
        }

        .result-item:last-child { border-bottom: none; }
        .result-item:hover { background: var(--surface2); }

        .result-icon {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .result-icon.ok     { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
        .result-icon.broken { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
        .result-icon.warn   { background: var(--warn); box-shadow: 0 0 6px var(--warn); }

        .url-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #a0a0b8;
            text-decoration: none;
            transition: color 0.15s;
        }

        .url-text:hover { color: var(--text); }

        .badge {
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge.ok     { background: rgba(79,255,176,0.1); color: var(--accent2); border: 1px solid rgba(79,255,176,0.2); }
        .badge.broken { background: rgba(255,79,107,0.1); color: var(--danger);  border: 1px solid rgba(255,79,107,0.2); }
        .badge.warn   { background: rgba(255,184,79,0.1); color: var(--warn);    border: 1px solid rgba(255,184,79,0.2); }

        /* ── Image Stats Row ── */
        .img-stats-row {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeUp 0.4s 0.05s ease both;
        }

        .img-stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            text-align: center;
        }

        .img-stat-val {
            font-size: 22px;
            font-weight: 800;
            display: block;
            letter-spacing: -0.02em;
        }

        .img-stat-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* ── No Results ── */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .empty .empty-icon { font-size: 32px; margin-bottom: 12px; }
        .empty p { font-size: 14px; }

        /* ── Error Alert ── */
        .alert {
            background: rgba(255,79,107,0.08);
            border: 1px solid rgba(255,79,107,0.25);
            color: var(--danger);
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            animation: fadeUp 0.3s ease both;
        }

        /* ── Animations ── */
        @keyframes spin     { to { transform: rotate(360deg); } }
        @keyframes pulse    { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
        @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .img-stats-row { grid-template-columns: repeat(3, 1fr); }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">

    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            LinkScan
        </div>
        <h1>Check every<br><span>link & image</span></h1>
        <p class="subtitle">Instantly audit broken links and missing images on any webpage.</p>
    </header>

    <div class="search-wrap">
        <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off" />
        <button id="scanBtn" onclick="scanLinks()">Scan →</button>
    </div>

    <div class="alert" id="alertBox"></div>
    <div id="loader">
        <div class="scan-anim">
            <div class="scan-ring"></div>
            <div class="scan-dot"></div>
        </div>
        <p>Scanning links & images…</p>
    </div>

    <!-- Link stats -->
    <div id="stats">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val white" id="s-total">—</span>
                <span class="stat-label">Links Found</span>
            </div>
            <div class="stat-card green">
                <span class="stat-val green" id="s-working">—</span>
                <span class="stat-label">Working</span>
            </div>
            <div class="stat-card red">
                <span class="stat-val red" id="s-broken">—</span>
                <span class="stat-label">Broken</span>
            </div>
            <div class="stat-card purple">
                <span class="stat-val purple" id="s-health">—</span>
                <span class="stat-label">Link Health</span>
            </div>
        </div>
    </div>

    <!-- Health bar -->
    <div class="health-bar-wrap" id="healthBarWrap">
        <div class="health-bar-header">
            <span>Link Health Score</span>
            <span class="health-pct" id="healthPctLabel">0%</span>
        </div>
        <div class="health-track">
            <div class="health-fill" id="healthFill"></div>
        </div>
    </div>

    <!-- Image stats -->
    <div class="img-stats-row" id="imgStatsRow">
        <div class="img-stat-card">
            <span class="img-stat-val" id="is-total" style="color:var(--text)">—</span>
            <span class="img-stat-label">Images Found</span>
        </div>
        <div class="img-stat-card">
            <span class="img-stat-val" id="is-working" style="color:var(--accent2)">—</span>
            <span class="img-stat-label">Loading</span>
        </div>
        <div class="img-stat-card">
            <span class="img-stat-val" id="is-broken" style="color:var(--danger)">—</span>
            <span class="img-stat-label">Broken Imgs</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs" style="display:flex">
        <button class="tab-btn active" onclick="switchTab('links', this)">Links</button>
        <button class="tab-btn" onclick="switchTab('images', this)">Images</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar" style="display:flex">
        <button class="filter-btn active" onclick="applyFilter('all', this)">All</button>
        <button class="filter-btn" onclick="applyFilter('ok', this)">Working</button>
        <button class="filter-btn" onclick="applyFilter('broken', this)">Broken</button>
    </div>

    <div id="resultsList"></div>

</div>

<script>
    let allLinks = [];
    let allImages = [];
    let activeTab = 'links';
    let activeFilter = 'all';

    function showAlert(msg) {
        const el = document.getElementById('alertBox');
        el.textContent = '⚠ ' + msg;
        el.style.display = 'block';
    }

    function hideAlert() {
        document.getElementById('alertBox').style.display = 'none';
    }

    function getBadgeClass(item) {
        if (item.ok) return 'ok';
        if (typeof item.status === 'number' && item.status >= 300 && item.status < 400) return 'warn';
        return 'broken';
    }

    function getIconClass(item) {
        if (item.ok) return 'ok';
        if (typeof item.status === 'number' && item.status >= 300 && item.status < 400) return 'warn';
        return 'broken';
    }

    function renderList(items) {
        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        const filtered = activeFilter === 'all'
            ? items
            : items.filter(i => activeFilter === 'ok' ? i.ok : !i.ok);

        if (!filtered.length) {
            list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No items match this filter.</p></div>`;
            list.style.display = 'block';
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div class="result-icon ${getIconClass(item)}"></div>
                <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" class="url-text" title="${escapeHtml(item.url)}">${escapeHtml(item.url)}</a>
                <span class="badge ${getBadgeClass(item)}">${item.status} ${item.label}</span>`;
            list.appendChild(div);
        });

        list.style.display = 'block';
    }

    function switchTab(tab, btn) {
        activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(tab === 'links' ? allLinks : allImages);
    }

    function applyFilter(filter, btn) {
        activeFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(activeTab === 'links' ? allLinks : allImages);
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setHealthBar(pct) {
        const fill = document.getElementById('healthFill');
        const label = document.getElementById('healthPctLabel');
        const color = pct >= 80 ? 'var(--accent2)' : pct >= 50 ? 'var(--warn)' : 'var(--danger)';
        fill.style.background = color;
        fill.style.boxShadow = `0 0 8px ${color}`;
        setTimeout(() => { fill.style.width = pct + '%'; label.textContent = pct + '%'; }, 50);
    }

    async function scanLinks() {
        const rawUrl = document.getElementById('urlInput').value.trim();
        if (!rawUrl) { showAlert('Please enter a URL.'); return; }
        hideAlert();

        const url = rawUrl.startsWith('http') ? rawUrl : 'https://' + rawUrl;

        // Reset UI
        document.getElementById('stats').style.display = 'none';
        document.getElementById('healthBarWrap').style.display = 'none';
        document.getElementById('imgStatsRow').style.display = 'none';
        document.getElementById('tabs').style.display = 'none';
        document.getElementById('filterBar').style.display = 'none';
        document.getElementById('resultsList').style.display = 'none';
        document.getElementById('resultsList').innerHTML = '';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('healthFill').style.width = '0%';
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));

        try {
            const res = await fetch('http://localhost:5000/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const data = await res.json();

            if (data.error) {
                showAlert(data.error);
                return;
            }

            allLinks  = data.links  || [];
            allImages = data.images || [];

            // Populate link stats
            document.getElementById('s-total').textContent   = data.total;
            document.getElementById('s-working').textContent = data.working;
            document.getElementById('s-broken').textContent  = data.broken;
            document.getElementById('s-health').textContent  = data.health + '%';
            document.getElementById('stats').style.display = 'block';

            // Health bar
            setHealthBar(data.health);
            document.getElementById('healthBarWrap').style.display = 'block';

            // Image stats
            if (data.image_stats) {
                document.getElementById('is-total').textContent   = data.image_stats.total;
                document.getElementById('is-working').textContent = data.image_stats.working;
                document.getElementById('is-broken').textContent  = data.image_stats.broken;
                document.getElementById('imgStatsRow').style.display = 'grid';
            }

            // Show tabs & filters
            document.getElementById('tabs').style.display = 'flex';
            document.getElementById('filterBar').style.display = 'flex';

            activeTab = 'links';
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === 0));

            renderList(allLinks);

        } catch (err) {
            showAlert('Could not connect to the API. Make sure api.py is running on port 5000.');
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('scanBtn').disabled = false;
        }
    }

    // Allow pressing Enter to scan
    document.getElementById('urlInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') scanLinks();
    });
</script>
</body>
</html>
